<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>軟管丈量記錄</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<style>
:root{
  --fs:system-ui,-apple-system,sans-serif;--fm:'Menlo','Consolas',monospace;
  --tp:#1a1410;--ts:#4a4540;--tt:#7a746e;--ti:#1a5c8a;--td:#b91c1c;
  --bp:#fdf8f2;--bs:#f0e8de;--bi:#dceefb;
  --bt:rgba(30,20,10,0.18);--bb:rgba(30,20,10,0.35);
  --rm:8px;--rl:12px;--pb:#e8e0d6;
}
@media(prefers-color-scheme:dark){:root{
  --tp:#f5f0e8;--ts:#c0b8ae;--tt:#857e76;--ti:#7dc4f0;--td:#f87171;
  --bp:#2a2520;--bs:#3a342e;--bi:#1a3a52;
  --bt:rgba(245,240,232,0.15);--bb:rgba(245,240,232,0.3);--pb:#1c1814;
}}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--pb);min-height:100%}
body{font-family:var(--fs);font-size:15px;color:var(--tp)}
select,input{font-family:var(--fs);color:var(--tp);background:var(--bp)}
#inp-len::-webkit-inner-spin-button,#inp-len::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
#inp-len{-moz-appearance:textfield;appearance:textfield}
#app{max-width:700px;margin:0 auto;padding:1rem}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
header h1{font-size:20px;font-weight:600}
header span{font-size:13px;color:var(--ts)}
.panel{background:var(--bp);border:1px solid var(--bt);border-radius:var(--rl);padding:1.1rem 1.25rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(30,20,10,0.08);transition:border .2s}
.panel.mode-new{border:3px solid #2563eb}
.panel.mode-edit{border:3px solid #c0392b}
.stitle{font-size:12px;font-weight:600;color:var(--ts);letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.mbadge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.04em}
.mb-new{background:#dbeafe;color:#1d4ed8}.mb-edit{background:#fee2e2;color:#b91c1c}
.lbl{font-size:13px;font-weight:500;color:var(--ts);margin-bottom:5px;display:block}
.preview{font-size:13px;color:var(--tt);margin-top:6px;font-family:var(--fm);min-height:18px;word-break:break-all}
.field{margin-bottom:14px}
.conn-row{display:flex;gap:6px;flex-wrap:wrap}
.ssel{padding:7px 8px;border-radius:var(--rm);border:1.5px solid var(--bb);font-size:14px;flex:1 1 auto;min-width:76px;max-width:100%;background:var(--bp);color:var(--tp)}
.ssel:focus{outline:2px solid var(--ti);outline-offset:1px}
.ssel:disabled{opacity:.4;cursor:not-allowed}
.inp-b{padding:8px 12px;border-radius:var(--rm);border:1.5px solid var(--bb);font-size:15px;background:var(--bp);color:var(--tp);width:100%}
.inp-b:focus{outline:2px solid var(--ti);outline-offset:1px}
.spec-row{display:flex;gap:8px;flex-wrap:wrap}
.spec-item{display:flex;flex-direction:column;gap:4px;flex:1 1 auto;min-width:90px}
.btn{background:transparent;border:1.5px solid var(--bb);border-radius:var(--rm);padding:8px 16px;font-size:14px;cursor:pointer;color:var(--tp);display:inline-flex;align-items:center;gap:7px;font-family:var(--fs);white-space:nowrap;font-weight:500}
.btn:hover{background:var(--bs)}.btn:active{transform:scale(.98)}
.btn.pri{background:#1a4a6e;color:#fff;border-color:#1a4a6e}.btn.pri:hover{background:#15405f}
.btn.sm{padding:5px 10px;font-size:13px;font-weight:500}
.btn-cp{background:transparent;border:1.5px solid var(--bb);border-radius:var(--rm);padding:6px 11px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--fs);color:var(--ts);display:inline-flex;align-items:center;gap:5px}
.btn-cp:hover{background:#e8f4fd;border-color:#1a5c8a;color:#1a5c8a}
.btn-ed{background:transparent;border:1.5px solid var(--bb);border-radius:var(--rm);padding:6px 11px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--fs);color:var(--ts);display:inline-flex;align-items:center;gap:5px}
.btn-ed:hover{background:#fff7e6;border-color:#b45309;color:#b45309}
.btn-dl{background:transparent;border:1.5px solid var(--bb);border-radius:var(--rm);padding:6px 11px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--fs);color:var(--ts);display:inline-flex;align-items:center;gap:5px}
.btn-dl:hover{background:#fef2f2;border-color:#b91c1c;color:#b91c1c}
.act-btns{display:flex;gap:8px;flex-wrap:nowrap}
.add-inp-row{display:none;gap:4px;margin-top:6px;align-items:center}
.add-inp-row input{flex:1;padding:6px 10px;border-radius:var(--rm);border:1.5px solid var(--bb);font-size:13px;min-width:0;background:var(--bp);color:var(--tp)}
.sel-wrap{display:flex;flex-direction:column;flex:1 1 auto;min-width:76px}
.form-btns{display:flex;gap:8px;margin-top:16px}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:14px;min-width:720px}
th{font-size:12px;font-weight:600;color:var(--ts);text-align:left;padding:0;border-bottom:1.5px solid var(--bb);white-space:nowrap;background:var(--bs);cursor:pointer;user-select:none}
th:hover{color:var(--tp)}
.th-inner{display:flex;align-items:center;gap:4px;padding:8px 10px;white-space:nowrap}
.th-text{display:inline-flex;align-items:center;gap:2px;flex:1}
.col-chk{width:15px;height:15px;cursor:pointer;accent-color:#1a4a6e;flex-shrink:0;margin:0}
th.r .th-inner{justify-content:flex-end}
td{padding:9px 10px;border-bottom:1px solid var(--bt);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bs)}
tr.hl td{background:var(--bi)!important}
.mono{font-family:var(--fm);font-size:12px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ti);font-weight:500}
.num-c{text-align:right;font-family:var(--fm);font-weight:600;font-size:14px;white-space:nowrap}
.ctr{text-align:center;font-family:var(--fm);font-weight:600;font-size:13px}
.note-c{font-size:13px;color:var(--ts);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stat-bar{display:flex;align-items:center;gap:12px;margin-top:14px;flex-wrap:wrap;font-size:13px;color:var(--ts)}
.stat-bar b{color:var(--tp);font-weight:600}
.vsep{width:1.5px;height:16px;background:var(--bt)}
.export-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.empty{text-align:center;padding:2.5rem;color:var(--tt);font-size:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a4a6e;color:#fff;padding:10px 22px;border-radius:20px;font-size:14px;font-weight:500;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">
<header>
  <h1>軟管丈量記錄</h1>
  <span id="hdr-count"></span>
</header>

<div class="panel mode-new" id="form-panel">
  <div class="stitle">
    <span id="form-title-txt">新增紀錄</span>
    <span class="mbadge mb-new" id="mode-badge">新增</span>
  </div>

  <div class="field">
    <span class="lbl">A 端</span>
    <div id="mntA"></div>
    <div class="preview">→ <span style="color:var(--ti)" id="pvA"></span></div>
  </div>
  <div class="field">
    <span class="lbl">長度 (mm)</span>
    <input type="number" id="inp-len" inputmode="numeric" class="inp-b" style="width:130px" autocomplete="off">
  </div>
  <div class="field">
    <span class="lbl">管徑 / 層數 / 工作壓力</span>
    <div class="spec-row">
      <div class="spec-item"><span class="lbl" style="font-size:12px;margin-bottom:3px">管徑</span><select id="inp-bore" class="ssel"></select></div>
      <div class="spec-item"><span class="lbl" style="font-size:12px;margin-bottom:3px">層數</span><select id="inp-layers" class="ssel"></select></div>
      <div class="spec-item"><span class="lbl" style="font-size:12px;margin-bottom:3px">工作壓力</span><select id="inp-pressure" class="ssel"></select></div>
    </div>
  </div>
  <div class="field">
    <span class="lbl">B 端</span>
    <div id="mntB"></div>
    <div class="preview">→ <span style="color:var(--ti)" id="pvB"></span></div>
  </div>
  <div class="field">
    <span class="lbl">數量</span>
    <input type="number" id="inp-qty" min="1" value="1" class="inp-b" style="width:100px">
  </div>
  <div class="field">
    <span class="lbl">位置 / 功用</span>
    <input type="text" id="inp-note" class="inp-b" autocomplete="off">
  </div>
  <div class="field" style="margin-bottom:0">
    <span class="lbl">給廠商</span>
    <input type="text" id="inp-vendor" class="inp-b" autocomplete="off">
  </div>
  <div class="form-btns">
    <button class="btn pri" id="btn-sub"><i class="ti ti-plus" id="ico-sub"></i><span id="lbl-sub">新增</span></button>
    <button class="btn" id="btn-cancel" style="display:none"><i class="ti ti-x"></i> 取消</button>
  </div>
</div>

<div class="panel" id="tbl-panel" style="display:none">
  <div class="tbl-wrap">
    <table id="main-table">
      <thead><tr id="thead-row">
        <!-- Built by JS -->
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="stat-bar">
    筆數 <b id="sc">0</b>
    <div class="vsep"></div>
    軟管總數 <b id="sq">0</b> 條
  </div>
  <div class="export-row">
    <button class="btn" id="btn-exp"><i class="ti ti-download"></i> 匯出 .txt</button>
    <button class="btn" id="btn-clip"><i class="ti ti-clipboard-copy"></i> 複製到剪貼簿</button>
  </div>
</div>

<div id="empty-msg" class="empty">
  <i class="ti ti-clipboard-list" style="font-size:28px;display:block;margin-bottom:8px"></i>
  尚無紀錄，填寫上方表單後新增
</div>
<div id="toast" class="toast"></div>
</div>

<script>
// ── 常數 ──────────────────────────────────────────────────────────
const TH_SZ=['1/8"','1/4"','3/8"','1/2"','3/4"','1"','1 1/4"','1 1/2"'];
const ST_SZ=['6L','8L','10L','12L','15L','18L','22L','8S','10S','12S','14S','16S','20S','25S'];
const BASE_TYPES=['母直頭','母90度頭','公直頭','公90度頭'];
const BORE_OPT=['1/4','3/8','1/2','5/8','3/4','1"','1-1/4','1-1/2','2"'];
const PRESSURE={
  '1/4':  [{l:1,p:225},{l:2,p:400}],
  '3/8':  [{l:1,p:180},{l:2,p:330},{l:4,p:445}],
  '1/2':  [{l:1,p:160},{l:2,p:276},{l:4,p:425}],
  '5/8':  [{l:1,p:130},{l:2,p:250},{l:4,p:350}],
  '3/4':  [{l:1,p:105},{l:2,p:215},{l:4,p:420}],
  '1"':   [{l:1,p:88},{l:2,p:165},{l:4,p:380}],
  '1-1/4':[{l:1,p:63},{l:2,p:125},{l:4,p:345}],
  '1-1/2':[{l:1,p:50},{l:2,p:90},{l:4,p:290}],
  '2"':   [{l:1,p:40},{l:2,p:80},{l:4,p:250}]
};
const BORE_MAP={
  TH:{'1/8"':null,'1/4"':'1/4','3/8"':'3/8','1/2"':'1/2','3/4"':'3/4','1"':'1"','1 1/4"':'1-1/4','1 1/2"':'1-1/2'},
  ST:{'6L':'1/4','8L':'1/4','10L':'3/8','12L':'3/8','15L':'1/2','18L':'5/8','22L':'3/4',
      '8S':'1/4','10S':'1/4','12S':'3/8','14S':'1/2','16S':'1/2','20S':'5/8','25S':'3/4'}
};
const custom={THSz:[],STSz:[],types:[]};

// ── 欄位定義（控制可見性與剪貼簿） ──────────────────────────────
const COLS=[
  {key:'num',    label:'編號',    sortCol:null,       w:'50px', align:'center'},
  {key:'a',      label:'A 端',   sortCol:'a',        w:''},
  {key:'len',    label:'長度',    sortCol:'len',      w:'76px', align:'right'},
  {key:'bore',   label:'管徑',    sortCol:'bore',     w:'58px'},
  {key:'layers', label:'層數',    sortCol:'layers',   w:'52px', align:'center'},
  {key:'pressure',label:'耐壓',   sortCol:'pressure', w:'72px', align:'right'},
  {key:'b',      label:'B 端',   sortCol:'b',        w:''},
  {key:'qty',    label:'數量',    sortCol:'qty',      w:'50px', align:'center'},
  {key:'note',   label:'位置/功用',sortCol:'note',    w:''},
  {key:'vendor', label:'給廠商',  sortCol:'vendor',   w:''},
];
const colVis={};
COLS.forEach(c=>colVis[c.key]=true);

// ── 建立表頭 ──────────────────────────────────────────────────────
function buildThead(){
  const tr=document.getElementById('thead-row');tr.innerHTML='';
  COLS.forEach(col=>{
    const th=document.createElement('th');
    if(col.w)th.style.width=col.w;
    if(col.align==='right')th.classList.add('r');
    if(col.sortCol)th.dataset.col=col.sortCol;
    th.dataset.ck=col.key;
    if(!colVis[col.key])th.style.display='none';
    const inner=document.createElement('div');inner.className='th-inner';
    const chk=document.createElement('input');chk.type='checkbox';chk.className='col-chk';chk.checked=colVis[col.key];
    chk.title='勾選後複製到剪貼簿時包含此欄';
    chk.addEventListener('click',e=>e.stopPropagation());
    chk.addEventListener('change',e=>{toggleColVis(col.key,e.target.checked);});
    const txt=document.createElement('span');txt.className='th-text';
    const si=document.createElement('span');si.id='si-'+col.key;si.style.cssText='font-size:9px;margin-left:2px';
    txt.appendChild(document.createTextNode(col.label));txt.appendChild(si);
    inner.appendChild(chk);inner.appendChild(txt);
    th.appendChild(inner);
    if(col.sortCol){
      th.addEventListener('click',e=>{
        if(e.target.classList.contains('col-chk'))return;
        const c=col.sortCol;
        sortDir=sortCol===c?(sortDir==='asc'?'desc':'asc'):'asc';
        sortCol=c;renderTable();
      });
    }
    tr.appendChild(th);
  });
  // ops th
  const opsTh=document.createElement('th');opsTh.style.width='1px';
  opsTh.innerHTML='<div class="th-inner"></div>';
  tr.appendChild(opsTh);
}

function toggleColVis(key,vis){
  colVis[key]=vis;
  // 僅影響剪貼簿輸出，不隱藏欄位
}

// ── Connector 工具 ────────────────────────────────────────────────
const isDirect=t=>t.endsWith('直頭');
function buildLabel(s){const p=s.cat==='TH'?'TH'+s.sz:s.sz;if(isDirect(s.type))return p+s.type;return p+s.type+(s.dir==='反向'?'(反向)':'');}
function boreFromConn(cs){return cs.cat==='TH'?(BORE_MAP.TH[cs.sz]||null):(BORE_MAP.ST[cs.sz]||null);}
function hasOpt(sel,val){for(const o of sel.options)if(o.value===val)return true;return false;}
function addOptToSel(sel,val){if(hasOpt(sel,val))return;const a=sel.querySelector('option[value="__ADD__"]');const o=document.createElement('option');o.value=val;o.textContent=val;if(a)sel.insertBefore(o,a);else sel.appendChild(o);}

let skipBoreUpdate=false;
function updPv(cs,pvId){
  document.getElementById(pvId).textContent=buildLabel(cs);
  if(cs===csA&&!skipBoreUpdate){const bore=boreFromConn(csA);document.getElementById('inp-bore').value=bore||'';rebuildLayersPressure(bore);}
}
function mkSelWrap(opts,customArr,val,onchange,catKey){
  const wrap=document.createElement('div');wrap.className='sel-wrap';
  const sel=document.createElement('select');sel.className='ssel';
  if(catKey)sel.dataset.cat=catKey;
  [...opts,...customArr].forEach(o=>{const opt=document.createElement('option');opt.value=o;opt.textContent=o;if(o===val)opt.selected=true;sel.appendChild(opt);});
  const addOpt=document.createElement('option');addOpt.value='__ADD__';addOpt.textContent='＋ 新增項目…';sel.appendChild(addOpt);
  const aRow=document.createElement('div');aRow.className='add-inp-row';
  const aInp=document.createElement('input');aInp.type='text';aInp.placeholder='輸入後按 Enter 確認';
  const xBtn=document.createElement('button');xBtn.className='btn sm';xBtn.type='button';xBtn.innerHTML='<i class="ti ti-x"></i>';
  aRow.appendChild(aInp);aRow.appendChild(xBtn);
  let prev=val;
  sel.addEventListener('change',e=>{if(e.target.value==='__ADD__'){sel.value=prev;aRow.style.display='flex';aInp.focus();}else{prev=e.target.value;aRow.style.display='none';onchange(e.target.value);}});
  const confirm=()=>{const v=aInp.value.trim();if(!v)return;customArr.push(v);if(catKey)document.querySelectorAll(`select[data-cat="${catKey}"]`).forEach(s=>addOptToSel(s,v));else addOptToSel(sel,v);sel.value=v;prev=v;aRow.style.display='none';aInp.value='';onchange(v);};
  aInp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();confirm();}if(e.key==='Escape'){aRow.style.display='none';aInp.value='';sel.value=prev;}});
  xBtn.addEventListener('click',()=>{aRow.style.display='none';aInp.value='';sel.value=prev;});
  wrap.appendChild(sel);wrap.appendChild(aRow);return{wrap,sel};
}
const csA={cat:'TH',sz:'1/4"',type:'母直頭',dir:'順向'};
const csB={cat:'TH',sz:'1/4"',type:'母直頭',dir:'順向'};
function buildConn(mountId,cs,pvId){
  const mnt=document.getElementById(mountId);mnt.innerHTML='';
  const row=document.createElement('div');row.className='conn-row';
  const catSel=document.createElement('select');catSel.className='ssel';
  ['TH','鋼管頭'].forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;if(v===cs.cat)o.selected=true;catSel.appendChild(o);});
  const szKey=cs.cat==='TH'?'THSz':'STSz';
  const szCtrl=mkSelWrap(cs.cat==='TH'?TH_SZ:ST_SZ,cs.cat==='TH'?custom.THSz:custom.STSz,cs.sz,v=>{cs.sz=v;updPv(cs,pvId);},szKey);
  const typeCtrl=mkSelWrap(BASE_TYPES,custom.types,cs.type,v=>{cs.type=v;dirWrap.style.display=isDirect(v)?'none':'block';if(isDirect(v))cs.dir='順向';updPv(cs,pvId);},'type');
  const dirWrap=document.createElement('div');dirWrap.style.cssText='flex:1 1 auto;min-width:76px;display:'+(isDirect(cs.type)?'none':'block');
  const dirSel=document.createElement('select');dirSel.className='ssel';
  ['順向','反向'].forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;if(v===cs.dir)o.selected=true;dirSel.appendChild(o);});
  dirSel.addEventListener('change',e=>{cs.dir=e.target.value;updPv(cs,pvId);});
  dirWrap.appendChild(dirSel);
  catSel.addEventListener('change',e=>{cs.cat=e.target.value;cs.sz=cs.cat==='TH'?TH_SZ[1]:ST_SZ[0];buildConn(mountId,cs,pvId);});
  row.appendChild(catSel);row.appendChild(szCtrl.wrap);row.appendChild(typeCtrl.wrap);row.appendChild(dirWrap);
  mnt.appendChild(row);updPv(cs,pvId);
}

// ── 管徑/層數/壓力 ───────────────────────────────────────────────
function rebuildLayersPressure(bore){
  const ls=document.getElementById('inp-layers');
  const ps=document.getElementById('inp-pressure');
  ls.innerHTML='';ps.innerHTML='';
  const entries=PRESSURE[bore]||[];
  if(!entries.length){
    ls.disabled=true;ps.disabled=true;
    ['inp-layers','inp-pressure'].forEach(id=>{const o=document.createElement('option');o.textContent='—';document.getElementById(id).appendChild(o);});return;
  }
  ls.disabled=false;ps.disabled=false;
  entries.forEach(e=>{
    const lo=document.createElement('option');lo.value=e.l;lo.textContent=e.l+'層';ls.appendChild(lo);
    const po=document.createElement('option');po.value=e.p;po.textContent=e.p+' BAR';ps.appendChild(po);
  });
  const defIdx=entries.findIndex(e=>e.l===2);const idx=defIdx>=0?defIdx:0;
  ls.selectedIndex=idx;ps.selectedIndex=idx;
}
function initSpecSection(){
  const boreSel=document.getElementById('inp-bore');
  const noneOpt=document.createElement('option');noneOpt.value='';noneOpt.textContent='—';boreSel.appendChild(noneOpt);
  BORE_OPT.forEach(b=>{const o=document.createElement('option');o.value=b;o.textContent=b;boreSel.appendChild(o);});
  boreSel.value=boreFromConn(csA)||'';
  rebuildLayersPressure(boreFromConn(csA));
  boreSel.addEventListener('change',e=>rebuildLayersPressure(e.target.value||null));
  document.getElementById('inp-layers').addEventListener('change',()=>{const idx=document.getElementById('inp-layers').selectedIndex;document.getElementById('inp-pressure').selectedIndex=idx;});
  document.getElementById('inp-pressure').addEventListener('change',()=>{const idx=document.getElementById('inp-pressure').selectedIndex;document.getElementById('inp-layers').selectedIndex=idx;});
}
function getSpec(){
  const bore=document.getElementById('inp-bore').value||null;
  const ls=document.getElementById('inp-layers');const ps=document.getElementById('inp-pressure');
  const layers=(!ls.disabled&&ls.value)?parseInt(ls.value):null;
  const pressure=(!ps.disabled&&ps.value)?parseInt(ps.value):null;
  return{bore,layers,pressure};
}
function setSpec(bore,layers){
  document.getElementById('inp-bore').value=bore||'';
  rebuildLayersPressure(bore||null);
  if(bore&&PRESSURE[bore]&&layers){const idx=PRESSURE[bore].findIndex(e=>e.l===layers);if(idx>=0){document.getElementById('inp-layers').selectedIndex=idx;document.getElementById('inp-pressure').selectedIndex=idx;}}
}

// ── 初始化 ────────────────────────────────────────────────────────
skipBoreUpdate=true;
buildConn('mntA',csA,'pvA');buildConn('mntB',csB,'pvB');
skipBoreUpdate=false;
initSpecSection();
buildThead();

// ── 記錄操作 ──────────────────────────────────────────────────────
let records=[],nextId=1,sortCol=null,sortDir='asc',editId=null;

function setEditMode(on,id){
  editId=on?id:null;
  const fp=document.getElementById('form-panel');
  fp.classList.toggle('mode-new',!on);fp.classList.toggle('mode-edit',on);
  document.getElementById('form-title-txt').textContent=on?'編輯紀錄':'新增紀錄';
  const badge=document.getElementById('mode-badge');badge.textContent=on?'編輯':'新增';
  badge.className='mbadge '+(on?'mb-edit':'mb-new');
  document.getElementById('ico-sub').className=on?'ti ti-check':'ti ti-plus';
  document.getElementById('lbl-sub').textContent=on?'儲存':'新增';
  document.getElementById('btn-cancel').style.display=on?'inline-flex':'none';
}
function fillForm(r){
  Object.assign(csA,r.a);Object.assign(csB,r.b);
  skipBoreUpdate=true;buildConn('mntA',csA,'pvA');buildConn('mntB',csB,'pvB');skipBoreUpdate=false;
  setSpec(r.bore,r.layers);
  document.getElementById('inp-len').value=r.len;document.getElementById('inp-qty').value=r.qty||1;
  document.getElementById('inp-note').value=r.note||'';document.getElementById('inp-vendor').value=r.vendor||'';
}
function resetForm(){
  Object.assign(csA,{cat:'TH',sz:'1/4"',type:'母直頭',dir:'順向'});
  Object.assign(csB,{cat:'TH',sz:'1/4"',type:'母直頭',dir:'順向'});
  skipBoreUpdate=true;buildConn('mntA',csA,'pvA');buildConn('mntB',csB,'pvB');skipBoreUpdate=false;
  const bore=boreFromConn(csA);document.getElementById('inp-bore').value=bore||'';rebuildLayersPressure(bore);
  document.getElementById('inp-len').value='';document.getElementById('inp-qty').value='1';
  document.getElementById('inp-note').value='';document.getElementById('inp-vendor').value='';
  setEditMode(false,null);
}
document.getElementById('btn-sub').addEventListener('click',()=>{
  const len=parseInt(document.getElementById('inp-len').value);
  if(!len||len<=0){document.getElementById('inp-len').focus();return;}
  const qty=Math.max(1,parseInt(document.getElementById('inp-qty').value)||1);
  const spec=getSpec();const note=document.getElementById('inp-note').value.trim();
  const vendor=document.getElementById('inp-vendor').value.trim();
  if(editId!==null){
    const r=records.find(x=>x.id===editId);
    if(r){r.a={...csA};r.b={...csB};r.len=len;Object.assign(r,spec);r.qty=qty;r.note=note;r.vendor=vendor;}
    setEditMode(false);
  }else{records.push({id:nextId++,a:{...csA},b:{...csB},len,...spec,qty,note,vendor});}
  resetForm();renderTable();
});
document.getElementById('btn-cancel').addEventListener('click',()=>{resetForm();renderTable();});
['inp-len','inp-qty','inp-note','inp-vendor'].forEach(id=>
  document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btn-sub').click();})
);

// ── 表格渲染 ──────────────────────────────────────────────────────
function sortedRecs(){
  if(!sortCol)return[...records];
  return[...records].sort((a,b)=>{
    let av,bv;
    if(sortCol==='a'){av=buildLabel(a.a);bv=buildLabel(b.a);}
    else if(sortCol==='b'){av=buildLabel(a.b);bv=buildLabel(b.b);}
    else if(sortCol==='len'){av=a.len;bv=b.len;}
    else if(sortCol==='bore'){av=a.bore||'';bv=b.bore||'';}
    else if(sortCol==='layers'){av=a.layers||0;bv=b.layers||0;}
    else if(sortCol==='pressure'){av=a.pressure||0;bv=b.pressure||0;}
    else if(sortCol==='qty'){av=a.qty;bv=b.qty;}
    else if(sortCol==='note'){av=a.note||'';bv=b.note||'';}
    else{av=a.vendor||'';bv=b.vendor||'';}
    return(av<bv?-1:av>bv?1:0)*(sortDir==='asc'?1:-1);
  });
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function makeTd(ck,content,cls,style){
  const td=document.createElement('td');
  td.dataset.ck=ck;if(cls)td.className=cls;if(style)td.style.cssText=style;
  td.innerHTML=content;return td;
}

function renderTable(){
  const panel=document.getElementById('tbl-panel');const empty=document.getElementById('empty-msg');
  if(!records.length){panel.style.display='none';empty.style.display='block';document.getElementById('hdr-count').textContent='';return;}
  panel.style.display='block';empty.style.display='none';
  document.getElementById('hdr-count').textContent='共 '+records.length+' 筆';
  COLS.forEach(col=>{const si=document.getElementById('si-'+col.key);if(si)si.textContent=sortCol===col.sortCol?(sortDir==='asc'?' ↑':' ↓'):'';});
  const tbody=document.getElementById('tbody');tbody.innerHTML='';
  sortedRecs().forEach((r,i)=>{
    const tr=document.createElement('tr');if(editId===r.id)tr.className='hl';
    const la=buildLabel(r.a),lb=buildLabel(r.b);
    const bore=r.bore||'—';
    const layers=r.layers?r.layers+'層':'—';
    const pressure=r.pressure?r.pressure+' BAR':'—';
    const qty=r.qty||1;
    tr.appendChild(makeTd('num',i+1,'','text-align:center;font-size:12px;color:var(--tt)'));
    tr.appendChild(makeTd('a',`<span class="mono" title="${esc(la)}">${esc(la)}</span>`));
    tr.appendChild(makeTd('len',`${r.len}<span style="font-size:10px;color:var(--tt);margin-left:2px">mm</span>`,'num-c'));
    tr.appendChild(makeTd('bore',`<span style="font-family:var(--fm);font-size:12px;font-weight:500">${esc(bore)}</span>`));
    tr.appendChild(makeTd('layers',layers,'','text-align:center;font-family:var(--fm);font-size:12px;font-weight:500'));
    tr.appendChild(makeTd('pressure',pressure,'','text-align:right;font-family:var(--fm);font-size:12px;font-weight:500;white-space:nowrap'));
    tr.appendChild(makeTd('b',`<span class="mono" title="${esc(lb)}">${esc(lb)}</span>`));
    tr.appendChild(makeTd('qty',qty,'ctr'));
    tr.appendChild(makeTd('note',r.note?`<span class="note-c" title="${esc(r.note)}">${esc(r.note)}</span>`:`<span style="color:var(--tt)">—</span>`));
    tr.appendChild(makeTd('vendor',r.vendor?`<span class="note-c" title="${esc(r.vendor)}">${esc(r.vendor)}</span>`:`<span style="color:var(--tt)">—</span>`));
    const opsTd=document.createElement('td');
    opsTd.innerHTML=`<div class="act-btns"><button class="btn-cp cp-btn" data-id="${r.id}"><i class="ti ti-copy"></i> 複製</button><button class="btn-ed ed-btn" data-id="${r.id}"><i class="ti ti-pencil"></i> 編輯</button><button class="btn-dl dl-btn" data-id="${r.id}"><i class="ti ti-trash"></i> 刪除</button></div>`;
    tr.appendChild(opsTd);tbody.appendChild(tr);
  });
  tbody.querySelectorAll('.cp-btn').forEach(b=>b.addEventListener('click',()=>{
    const r=records.find(x=>x.id===parseInt(b.dataset.id));if(!r)return;
    const nr={id:nextId++,a:{...r.a},b:{...r.b},len:r.len,bore:r.bore,layers:r.layers,pressure:r.pressure,qty:r.qty||1,note:r.note,vendor:r.vendor};
    records.splice(records.findIndex(x=>x.id===r.id)+1,0,nr);
    fillForm(nr);setEditMode(true,nr.id);renderTable();
  }));
  tbody.querySelectorAll('.ed-btn').forEach(b=>b.addEventListener('click',()=>{
    const r=records.find(x=>x.id===parseInt(b.dataset.id));if(!r)return;
    fillForm(r);setEditMode(true,r.id);renderTable();
  }));
  tbody.querySelectorAll('.dl-btn').forEach(b=>b.addEventListener('click',()=>{
    const r=records.find(x=>x.id===parseInt(b.dataset.id));if(!r)return;
    const idx=sortedRecs().findIndex(x=>x.id===r.id)+1;
    const la=buildLabel(r.a),lb=buildLabel(r.b);
    showConfirm(`確定要刪除第 ${idx} 筆嗎？\n${la} ＊ ${lb} ＊ ${r.len}mm\n\n此操作無法復原。`,()=>{
      if(editId===r.id)resetForm();
      records=records.filter(x=>x.id!==r.id);renderTable();
    });
  }));
  document.getElementById('sc').textContent=records.length;
  document.getElementById('sq').textContent=records.reduce((s,r)=>s+(r.qty||1),0);
}

// ── 匯出 ──────────────────────────────────────────────────────────
function buildClipboardText(recs){
  // 抬頭：依勾選欄位組合
  const connCols=[];
  if(colVis.a)connCols.push('A端');
  if(colVis.b)connCols.push('B端');
  const hdrFields=[];
  if(connCols.length)hdrFields.push(connCols.join('-'));
  const midKeys=[{k:'len',l:'長度'},{k:'bore',l:'管徑'},{k:'layers',l:'層數'},{k:'pressure',l:'耐壓'},{k:'qty',l:'數量'},{k:'note',l:'位置/功用'}];
  midKeys.forEach(({k,l})=>{if(colVis[k])hdrFields.push(l);});
  let header='';
  if(colVis.num)header='編號  ';
  header+=hdrFields.join('*');
  if(colVis.vendor)header+=' (給廠商)';

  // 資料行
  const lines=recs.map((r,i)=>{
    const la=buildLabel(r.a),lb=buildLabel(r.b);
    const connParts=[];
    if(colVis.a)connParts.push(la);
    if(colVis.b)connParts.push(lb);
    const dataFields=[];
    if(connParts.length)dataFields.push(connParts.join('-'));
    if(colVis.len)dataFields.push(r.len);
    if(colVis.bore)dataFields.push(r.bore||'—');
    if(colVis.layers)dataFields.push(r.layers?r.layers+'層':'—');
    if(colVis.pressure)dataFields.push(r.pressure?r.pressure+'BAR':'—');
    if(colVis.qty)dataFields.push(r.qty||1);
    if(colVis.note)dataFields.push(r.note||'—');
    let line='';
    if(colVis.num)line=`#${i+1}  `;
    line+=dataFields.join('*');
    if(colVis.vendor&&r.vendor)line+=` (${r.vendor})`;
    return line;
  });

  // 頁尾
  const totalQty=recs.reduce((s,r)=>s+(r.qty||1),0);
  const footer=`\n共 ${recs.length} 筆　軟管總數 ${totalQty} 條`;
  return header+'\n'+lines.join('\n')+footer;
}

function buildTxt(recs){
  const d=new Date();const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const lines=recs.map((r,i)=>{
    const la=buildLabel(r.a),lb=buildLabel(r.b);
    const spec=(r.layers&&r.pressure)?`${r.layers}層/${r.pressure}BAR`:'—';
    const parts=[`${i+1}. ${la}＊${lb}＊${r.len}mm＊${r.bore||'—'}＊${spec}×${r.qty||1}`];
    if(r.note)parts.push(r.note);if(r.vendor)parts.push(`[${r.vendor}]`);return parts.join(' ');
  });
  const total=recs.reduce((s,r)=>s+(r.qty||1),0);
  return`軟管清單 ${ds}\n${'─'.repeat(44)}\n${lines.join('\n')}\n\n共 ${recs.length} 筆　軟管總數 ${total} 條`;
}

function showConfirm(msg,onConfirm){
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem';
  const box=document.createElement('div');
  box.style.cssText='background:var(--bp);border-radius:12px;padding:1.25rem 1.5rem;max-width:320px;width:100%;box-shadow:0 8px 28px rgba(0,0,0,0.28)';
  const p=document.createElement('p');
  p.style.cssText='font-size:14px;color:var(--tp);line-height:1.6;margin-bottom:18px;white-space:pre-line';
  p.textContent=msg;
  const btns=document.createElement('div');
  btns.style.cssText='display:flex;gap:8px;justify-content:flex-end';
  const cancelBtn=document.createElement('button');
  cancelBtn.className='btn';cancelBtn.textContent='取消';cancelBtn.style.cssText='padding:7px 16px;font-size:14px';
  const okBtn=document.createElement('button');
  okBtn.style.cssText='background:#b91c1c;color:#fff;border:none;border-radius:var(--rm);padding:7px 16px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--fs)';
  okBtn.textContent='確定刪除';
  cancelBtn.addEventListener('click',()=>overlay.remove());
  okBtn.addEventListener('click',()=>{overlay.remove();onConfirm();});
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
  btns.appendChild(cancelBtn);btns.appendChild(okBtn);
  box.appendChild(p);box.appendChild(btns);
  overlay.appendChild(box);document.body.appendChild(overlay);
  okBtn.focus();
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

document.getElementById('btn-exp').addEventListener('click',()=>{
  const d=new Date();const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const blob=new Blob([buildTxt(sortedRecs())],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`軟管清單_${ds}.txt`;a.click();URL.revokeObjectURL(url);
});
document.getElementById('btn-clip').addEventListener('click',async()=>{
  const txt=buildClipboardText(sortedRecs());
  try{await navigator.clipboard.writeText(txt);}
  catch(e){const ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;top:-9999px';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
  showToast('✓ 已複製到剪貼簿');
});

window.addEventListener('beforeunload',e=>{if(records.length>0){e.preventDefault();e.returnValue='確定要離開嗎？頁面上的紀錄尚未匯出，離開後將全部清除。';return e.returnValue;}});
renderTable();
</script>
