<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>軟管丈量記錄 v1.3</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<style>
:root{
  --fs:system-ui,-apple-system,sans-serif;--fm:'Menlo','Consolas',monospace;
  --tp:#1a1410;--ts:#4a4540;--tt:#7a746e;--ti:#1a5c8a;--td:#b91c1c;
  --bp:#fdf8f2;--bs:#f0e8de;--bi:#dceefb;
  --bt:rgba(30,20,10,0.18);--bb:rgba(30,20,10,0.35);
  --rm:8px;--rl:12px;--pb:#e8e0d6;
}
@media(prefers-color-scheme:dark){:root{
  --tp:#f5f0e8;--ts:#c0b8ae;--tt:#857e76;--ti:#7dc4f0;--td:#f87171;
  --bp:#2a2520;--bs:#3a342e;--bi:#1a3a52;
  --bt:rgba(245,240,232,0.15);--bb:rgba(245,240,232,0.3);--pb:#1c1814;
}}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--pb);min-height:100%}
body{font-family:var(--fs);font-size:15px;color:var(--tp)}
select,input{font-family:var(--fs);color:var(--tp);background:var(--bp)}
#inp-len::-webkit-inner-spin-button,#inp-len::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
#inp-len{-moz-appearance:textfield;appearance:textfield}
#app{max-width:720px;margin:0 auto;padding:1rem}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
header h1{font-size:20px;font-weight:600}
header span{font-size:13px;color:var(--ts)}
.panel{background:var(--bp);border:1px solid var(--bt);border-radius:var(--rl);padding:1.1rem 1.25rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(30,20,10,0.08);transition:border .2s}
.panel.mode-new{border:3px solid #2563eb}
.panel.mode-edit{border:3px solid #c0392b}
.stitle{font-size:12px;font-weight:600;color:var(--ts);letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.mbadge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.mb-new{background:#dbeafe;color:#1d4ed8}.mb-edit{background:#fee2e2;color:#b91c1c}
.lbl{font-size:13px;font-weight:500;color:var(--ts);margin-bottom:5px;display:block}
.preview{font-size:13px;color:var(--tt);margin-top:6px;font-family:var(--fm);min-height:18px;word-break:break-all}
.field{margin-bottom:14px}
.conn-row{display:flex;gap:6px;flex-wrap:wrap}
.ssel{padding:7px 8px;border-radius:var(--rm);border:1.5px solid var(--bb);font-size:14px;flex:1 1 auto;min-width:76px;max-width:100%;background:var(--bp);color:var(--tp)}
.ssel:focus{outline:2px solid var(--ti);outline-offset:1px}
.ssel:disabled{opacity:.4}
.inp-b{padding:8px 12px;border-radius:var(--rm);border:1.5px solid var(--bb);font-size:15px;background:var(--bp);color:var(--tp);width:100%}
.inp-b:focus{outline:2px solid var(--ti);outline-offset:1px}
.spec-row{display:flex;gap:8px;flex-wrap:wrap}
.spec-item{display:flex;flex-direction:column;gap:4px;flex:1 1 auto;min-width:90px}
.btn{background:transparent;border:1.5px solid var(--bb);border-radius:var(--rm);padding:8px 16px;font-size:14px;cursor:pointer;color:var(--tp);display:inline-flex;align-items:center;gap:7px;font-family:var(--fs);white-space:nowrap;font-weight:500}
.btn:hover{background:var(--bs)}.btn:active{transform:scale(.98)}
.btn.pri{background:#1a4a6e;color:#fff;border-color:#1a4a6e}.btn.pri:hover{background:#15405f}
.btn.sm{padding:5px 10px;font-size:13px}
.btn.add-fit{border-style:dashed;color:var(--ti);border-color:var(--ti)}
.btn.danger{color:var(--td);border-color:var(--td)}.btn.danger:hover{background:#fef2f2}
.btn-cp{background:transparent;border:1.5px solid var(--bb);border-radius:var(--rm);padding:6px 11px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--fs);color:var(--ts);display:inline-flex;align-items:center;gap:5px}
.btn-cp:hover{background:#e8f4fd;border-color:#1a5c8a;color:#1a5c8a}
.btn-ed{background:transparent;border:1.5px solid var(--bb);border-radius:var(--rm);padding:6px 11px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--fs);color:var(--ts);display:inline-flex;align-items:center;gap:5px}
.btn-ed:hover{background:#fff7e6;border-color:#b45309;color:#b45309}
.btn-dl{background:transparent;border:1.5px solid var(--bb);border-radius:var(--rm);padding:6px 11px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--fs);color:var(--ts);display:inline-flex;align-items:center;gap:5px}
.btn-dl:hover{background:#fef2f2;border-color:#b91c1c;color:#b91c1c}
.act-btns{display:flex;gap:8px;flex-wrap:nowrap}
.add-inp-row{display:none;gap:4px;margin-top:6px;align-items:center}
.add-inp-row input{flex:1;padding:6px 10px;border-radius:var(--rm);border:1.5px solid var(--bb);font-size:13px;min-width:0;background:var(--bp);color:var(--tp)}
.sel-wrap{display:flex;flex-direction:column;flex:1 1 auto;min-width:76px}
.form-btns{display:flex;gap:8px;margin-top:16px}
.fit-card{background:var(--bs);border-radius:var(--rm);padding:10px;margin-bottom:8px;display:flex;flex-direction:column;gap:8px}
.fit-top{display:flex;gap:8px;align-items:center}
.port-group{background:var(--bp);border-radius:6px;padding:8px;border:1px solid var(--bt)}
.port-hdr{font-size:11px;font-weight:700;color:var(--ts);margin-bottom:6px;letter-spacing:.05em}
.port-fields{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.gender-fixed{padding:6px 10px;border-radius:var(--rm);border:1.5px solid var(--bt);font-size:13px;color:var(--ts);background:var(--bs);flex:0 0 auto;white-space:nowrap}
.fit-reveal{animation:fadeSlide .18s ease}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:14px;min-width:860px}
th{font-size:12px;font-weight:600;color:var(--ts);text-align:left;padding:0;border-bottom:1.5px solid var(--bb);white-space:nowrap;background:var(--bs)}
th:hover{color:var(--tp)}
.th-inner{display:flex;align-items:center;gap:4px;padding:8px 10px;white-space:nowrap}
.th-text{display:inline-flex;align-items:center;gap:2px}
th.r .th-inner{justify-content:flex-end}th.c .th-inner{justify-content:center}
td{padding:9px 10px;border-bottom:1px solid var(--bt);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bs)}
tr.hl td{background:var(--bi)!important}
.mono{font-family:var(--fm);font-size:12px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ti);font-weight:500}
.num-c{text-align:right;font-family:var(--fm);font-weight:600;font-size:14px;white-space:nowrap}
.ctr{text-align:center;font-family:var(--fm);font-weight:600;font-size:13px}
.note-c{font-size:13px;color:var(--ts);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fit-c{font-size:12px;color:var(--ts);line-height:1.5;max-width:150px}
.stat-bar{display:flex;align-items:center;gap:12px;margin-top:14px;flex-wrap:wrap;font-size:13px;color:var(--ts)}
.stat-bar b{color:var(--tp);font-weight:600}
.vsep{width:1.5px;height:16px;background:var(--bt)}
.export-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.hint{font-size:12px;color:var(--tt);margin-top:8px}
.danger-zone{margin-top:12px;padding-top:12px;border-top:1px solid var(--bt)}
.empty{text-align:center;padding:2.5rem;color:var(--tt);font-size:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a4a6e;color:#fff;padding:10px 22px;border-radius:20px;font-size:14px;font-weight:500;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
#print-area{display:none}
@media print{
  html,body{background:#fff!important}
  #app{display:none!important}
  #print-area{display:block!important;color:#000;font-family:sans-serif}
  @page{size:A4 landscape;margin:9mm}
  #print-area h1{font-size:16px;margin:0 0 4px}
  #print-area h2{font-size:13px;margin:16px 0 6px}
  #print-area .meta{font-size:11px;color:#333;margin-bottom:10px}
  #print-area table{width:100%;border-collapse:collapse;font-size:10px;margin:0 auto 16px}
  #print-area th{border:1px solid #000;padding:5px 6px;background:#e5e5e5;font-weight:700;text-align:center}
  #print-area td{border:1px solid #777;padding:4px 6px;vertical-align:top}
  #print-area tr{page-break-inside:avoid}
}
</style>
</head>
<body>
<div id="app">
<header>
  <h1>軟管丈量記錄</h1>
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <span id="hdr-count"></span>
    <span style="font-size:11px;font-weight:700;color:var(--tt);letter-spacing:.06em;padding:2px 8px;border:1px solid var(--bt);border-radius:20px">v1.3</span>
  </div>
</header>

<div class="panel mode-new" id="form-panel">
  <div class="stitle"><span id="form-title-txt">新增紀錄</span><span class="mbadge mb-new" id="mode-badge">新增</span></div>
  <div class="field"><span class="lbl">A 端</span><div id="mntA"></div><div class="preview">→ <span style="color:var(--ti)" id="pvA"></span></div></div>
  <div class="field"><span class="lbl">B 端</span><div id="mntB"></div><div class="preview">→ <span style="color:var(--ti)" id="pvB"></span></div></div>
  <div class="field"><span class="lbl">長度 (mm)</span><input type="number" id="inp-len" inputmode="numeric" class="inp-b" style="width:130px" autocomplete="off"></div>
  <div class="field">
    <span class="lbl">管徑 / 層數 / 工作壓力</span>
    <div class="spec-row">
      <div class="spec-item"><span class="lbl" style="font-size:12px;margin-bottom:3px">管徑</span><select id="inp-bore" class="ssel"></select></div>
      <div class="spec-item"><span class="lbl" style="font-size:12px;margin-bottom:3px">層數(可留空)</span><select id="inp-layers" class="ssel"></select></div>
      <div class="spec-item"><span class="lbl" style="font-size:12px;margin-bottom:3px">工作壓力(可留空) (BAR)</span><input type="number" id="inp-pressure" inputmode="numeric" class="inp-b" style="font-size:14px" autocomplete="off"></div>
    </div>
  </div>
  <div class="field"><span class="lbl">數量</span><input type="number" id="inp-qty" min="1" value="1" class="inp-b" style="width:100px"></div>
  <div class="field">
    <span class="lbl">使用接頭</span>
    <div id="fittings-container"></div>
    <button class="btn add-fit sm" id="btn-add-fit" type="button" style="margin-top:4px"><i class="ti ti-plus"></i> 新增接頭</button>
  </div>
  <div class="field"><span class="lbl">位置/功用/備註</span><input type="text" id="inp-note" class="inp-b" autocomplete="off"></div>
  <div class="field" style="margin-bottom:0"><span class="lbl">說明(給廠商)</span><input type="text" id="inp-vendor" class="inp-b" autocomplete="off"></div>
  <div class="form-btns">
    <button class="btn pri" id="btn-sub"><i class="ti ti-plus" id="ico-sub"></i><span id="lbl-sub">新增</span></button>
    <button class="btn" id="btn-cancel" style="display:none"><i class="ti ti-x"></i> 取消</button>
  </div>
</div>

<div class="panel" id="tbl-panel" style="display:none">
  <div class="tbl-wrap"><table id="main-table"><thead><tr id="thead-row"></tr></thead><tbody id="tbody"></tbody></table></div>
  <div class="stat-bar">筆數 <b id="sc">0</b><div class="vsep"></div>軟管總數 <b id="sq">0</b> 條</div>
  <div class="export-row">
    <button class="btn" id="btn-pdf"><i class="ti ti-file-type-pdf"></i> 保存成PDF</button>
    <button class="btn" id="btn-vendor"><i class="ti ti-file-type-pdf"></i> 給廠商PDF</button>
  </div>
  <div class="hint">PDF 透過瀏覽器列印產生，請於對話框選擇「另存為 PDF」即可下載或分享。</div>
  <div class="danger-zone"><button class="btn danger" id="btn-clear-all"><i class="ti ti-trash-x"></i> 清空所有數據</button></div>
</div>

<div id="empty-msg" class="empty"><i class="ti ti-clipboard-list" style="font-size:28px;display:block;margin-bottom:8px"></i>尚無紀錄，填寫上方表單後新增</div>
<div id="toast" class="toast"></div>
</div>
<div id="print-area"></div>

<script>
// ── 接頭規格資料 ──────────────────────────────────────────────────
const SHAPES_CONFIG={
  '直接頭':{ports:['#1','#2']},
  '90度接頭':{ports:['#1','#2']},
  '45度接頭':{ports:['#1','#2']},
  'BANJO':{ports:['#1','#2']},
  '三通':{ports:['#1','#2','#3']}
};
const PORT_SPECS={
  Steel_Tube_Fitting:{name:'鋼管頭',genders:['公','母'],sizes:['6L','8L','10L','12L','15L','18L','22L','28L','35L','42L','6S','8S','10S','12S','14S','16S','20S','25S','30S','38S']},
  TH_Fitting:{name:'TH頭',genders:['公','母'],sizes:['1/8"','3/16"','1/4"','5/16"','3/8"','1/2"','5/8"','3/4"','7/8"','1"','1-1/4"','1-1/2"','2"']},
  Metric_Port:{name:'公制牙口',genders:null,sizes:['M8x1','M10x1','M12x1.5','M14x1.5','M16x1.5','M18x1.5','M22x1.5','M27x2','M33x2','M42x2','M48x2','M60x2']},
  PT_Thread:{name:'PT牙口',genders:null,sizes:['1/8"','1/4"','3/8"','1/2"','3/4"','1"','1-1/4"','1-1/2"','2"']},
  G_Thread:{name:'G牙口',genders:null,sizes:['1/8"','1/4"','3/8"','1/2"','5/8"','3/4"','1"','1-1/4"','1-1/2"','2"']}
};
const SHORT={Steel_Tube_Fitting:'鋼管頭',TH_Fitting:'TH',Metric_Port:'公制',PT_Thread:'PT',G_Thread:'G'};

// ── 軟管接頭/管徑常數 ─────────────────────────────────────────────
const TH_SZ=['1/8"','1/4"','3/8"','1/2"','3/4"','1"','1 1/4"','1 1/2"'];
const ST_SZ=['6L','8L','10L','12L','15L','18L','22L','8S','10S','12S','14S','16S','20S','25S'];
const BASE_TYPES=['母直頭','母90度頭','公直頭','公90度頭'];
const BORE_OPT=['1/4','3/8','1/2','5/8','3/4','1"','1-1/4','1-1/2','2"'];
const BORE_LAYERS={'1/4':[1,2],'3/8':[1,2,4],'1/2':[1,2,4],'5/8':[1,2,4],'3/4':[1,2,4],'1"':[1,2,4],'1-1/4':[1,2,4],'1-1/2':[1,2,4],'2"':[1,2,4]};
const BORE_MAP={
  TH:{'1/8"':null,'1/4"':'1/4','3/8"':'3/8','1/2"':'1/2','3/4"':'3/4','1"':'1"','1 1/4"':'1-1/4','1 1/2"':'1-1/2'},
  ST:{'6L':'1/4','8L':'1/4','10L':'3/8','12L':'3/8','15L':'1/2','18L':'5/8','22L':'3/4','8S':'1/4','10S':'1/4','12S':'3/8','14S':'1/2','16S':'1/2','20S':'5/8','25S':'3/4'}
};
const custom={THSz:[],STSz:[],types:[]};
const COLS=[
  {key:'num',label:'編號',sortCol:null,w:'48px',align:'center'},
  {key:'a',label:'A 端',sortCol:'a'},
  {key:'b',label:'B 端',sortCol:'b'},
  {key:'len',label:'長度',sortCol:'len',w:'70px',align:'right'},
  {key:'bore',label:'管徑',sortCol:'bore',w:'56px'},
  {key:'layers',label:'層數',sortCol:'layers',w:'52px',align:'center'},
  {key:'pressure',label:'耐壓',sortCol:'pressure',w:'64px',align:'right'},
  {key:'qty',label:'數量',sortCol:'qty',w:'48px',align:'center'},
  {key:'fittings',label:'使用接頭',sortCol:null},
  {key:'note',label:'位置/功用/備註',sortCol:'note'},
  {key:'vendor',label:'說明(給廠商)',sortCol:'vendor'}
];

// ── 持久化 ────────────────────────────────────────────────────────
const STORAGE_KEY='hose_measurement_v3';
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({records,nextId,custom,sessionDefaultPressure}));}catch(e){}}
function loadState(){
  try{
    const d=JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');if(!d)return;
    if(Array.isArray(d.records))records=d.records;
    if(d.nextId)nextId=d.nextId;
    if(d.custom){custom.THSz=d.custom.THSz||[];custom.STSz=d.custom.STSz||[];custom.types=d.custom.types||[];}
    if(d.sessionDefaultPressure!==undefined)sessionDefaultPressure=d.sessionDefaultPressure;
  }catch(e){}
}

// ── Connector 工具 ────────────────────────────────────────────────
const isDirect=t=>t.endsWith('直頭');
function buildLabel(s){const p=s.cat==='TH'?'TH'+s.sz:s.sz;if(isDirect(s.type))return p+s.type;return p+s.type+(s.dir==='反向'?'(反向)':'');}
function boreFromConn(cs){return cs.cat==='TH'?(BORE_MAP.TH[cs.sz]||null):(BORE_MAP.ST[cs.sz]||null);}
function hasOpt(sel,val){for(const o of sel.options)if(o.value===val)return true;return false;}
function addOptToSel(sel,val){if(hasOpt(sel,val))return;const a=sel.querySelector('option[value="__ADD__"]');const o=document.createElement('option');o.value=val;o.textContent=val;if(a)sel.insertBefore(o,a);else sel.appendChild(o);}
let skipBoreUpdate=false;
function updPv(cs,pvId){
  document.getElementById(pvId).textContent=buildLabel(cs);
  if(cs===csA&&!skipBoreUpdate){const bore=boreFromConn(csA);document.getElementById('inp-bore').value=bore||'';rebuildLayers(bore);}
}
function mkSelWrap(opts,customArr,val,onchange,catKey){
  const wrap=document.createElement('div');wrap.className='sel-wrap';
  const sel=document.createElement('select');sel.className='ssel';
  if(catKey)sel.dataset.cat=catKey;
  [...opts,...customArr].forEach(o=>{const op=document.createElement('option');op.value=o;op.textContent=o;if(o===val)op.selected=true;sel.appendChild(op);});
  const addOpt=document.createElement('option');addOpt.value='__ADD__';addOpt.textContent='＋ 新增項目…';sel.appendChild(addOpt);
  const aRow=document.createElement('div');aRow.className='add-inp-row';
  const aInp=document.createElement('input');aInp.type='text';aInp.placeholder='輸入後按 Enter 確認';
  const xBtn=document.createElement('button');xBtn.className='btn sm';xBtn.type='button';xBtn.innerHTML='<i class="ti ti-x"></i>';
  aRow.appendChild(aInp);aRow.appendChild(xBtn);
  let prev=val;
  sel.addEventListener('change',e=>{if(e.target.value==='__ADD__'){sel.value=prev;aRow.style.display='flex';aInp.focus();}else{prev=e.target.value;aRow.style.display='none';onchange(e.target.value);}});
  const doConfirm=()=>{const v=aInp.value.trim();if(!v)return;customArr.push(v);if(catKey)document.querySelectorAll(`select[data-cat="${catKey}"]`).forEach(s=>addOptToSel(s,v));else addOptToSel(sel,v);sel.value=v;prev=v;aRow.style.display='none';aInp.value='';onchange(v);saveState();};
  aInp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doConfirm();}if(e.key==='Escape'){aRow.style.display='none';aInp.value='';sel.value=prev;}});
  xBtn.addEventListener('click',()=>{aRow.style.display='none';aInp.value='';sel.value=prev;});
  wrap.appendChild(sel);wrap.appendChild(aRow);return{wrap,sel};
}
const csA={cat:'TH',sz:'1/4"',type:'母直頭',dir:'順向'};
const csB={cat:'TH',sz:'1/4"',type:'母直頭',dir:'順向'};
function buildConn(mountId,cs,pvId){
  const mnt=document.getElementById(mountId);mnt.innerHTML='';
  const row=document.createElement('div');row.className='conn-row';
  const catSel=document.createElement('select');catSel.className='ssel';
  ['TH','鋼管頭'].forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;if(v===cs.cat)o.selected=true;catSel.appendChild(o);});
  const szKey=cs.cat==='TH'?'THSz':'STSz';
  const szCtrl=mkSelWrap(cs.cat==='TH'?TH_SZ:ST_SZ,cs.cat==='TH'?custom.THSz:custom.STSz,cs.sz,v=>{cs.sz=v;updPv(cs,pvId);},szKey);
  const typeCtrl=mkSelWrap(BASE_TYPES,custom.types,cs.type,v=>{cs.type=v;dirWrap.style.display=isDirect(v)?'none':'block';if(isDirect(v))cs.dir='順向';updPv(cs,pvId);},'type');

function rebuildLayers(bore){
  const ls=document.getElementById('inp-layers');
  const cur=ls.value;ls.innerHTML='';
  const blank=document.createElement('option');blank.value='';blank.textContent='—';ls.appendChild(blank);
  const opts=(bore&&BORE_LAYERS[bore])?BORE_LAYERS[bore]:[1,2,4];
  opts.forEach(l=>{const o=document.createElement('option');o.value=l;o.textContent=l+'層';ls.appendChild(o);});
  ls.value=(opts.includes(parseInt(cur)))?cur:'';
}
function initBoreSection(){
  const boreSel=document.getElementById('inp-bore');
  const blank=document.createElement('option');blank.value='';blank.textContent='—';boreSel.appendChild(blank);
  BORE_OPT.forEach(b=>{const o=document.createElement('option');o.value=b;o.textContent=b;boreSel.appendChild(o);});
  boreSel.value=boreFromConn(csA)||'';
  rebuildLayers(boreFromConn(csA));
  boreSel.addEventListener('change',e=>rebuildLayers(e.target.value||null));
  // 互斥：填層數 → 清壓力；填壓力 → 清層數
  document.getElementById('inp-layers').addEventListener('change',e=>{if(e.target.value)document.getElementById('inp-pressure').value='';});
  document.getElementById('inp-pressure').addEventListener('input',e=>{if(e.target.value.trim())document.getElementById('inp-layers').value='';});
}
function getSpec(){
  const bore=document.getElementById('inp-bore').value||null;
  const lv=document.getElementById('inp-layers').value;
  const layers=lv?parseInt(lv):null;
  const pv=document.getElementById('inp-pressure').value;
  const pressure=pv?parseInt(pv):null;
  return{bore,layers,pressure};
}
function setSpec(bore,layers,pressure){
  document.getElementById('inp-bore').value=bore||'';rebuildLayers(bore||null);
  const ls=document.getElementById('inp-layers');
  if(layers){for(let i=0;i<ls.options.length;i++){if(parseInt(ls.options[i].value)===layers){ls.selectedIndex=i;break;}}}
  else ls.value='';
  document.getElementById('inp-pressure').value=pressure||'';
}

let formFittings=[];
function defaultFitting(){return{shape:'',ports:[],qty:1};}
function defaultPort(){return{spec:'',gender:null,size:''};}
function fittingLabel(f){
  if(!f.shape)return'(未完成)';
  const portStrs=(f.ports||[]).filter(p=>p.spec).map(p=>{
    const short=SHORT[p.spec]||p.spec;
    const sp=PORT_SPECS[p.spec];
    const gender=(sp&&sp.genders&&p.gender)?p.gender:'';
    return`${short}${p.size}${gender}`;
  });
  return`${f.shape}-${portStrs.join('*')} ×${f.qty}`;
}
function renderFittingsForm(){

function mkSimpleSel(opts,val,getText,onChange,blankLabel){
  const s=document.createElement('select');s.className='ssel';
  if(blankLabel!==undefined){const b=document.createElement('option');b.value='';b.textContent=blankLabel;if(!val)b.selected=true;s.appendChild(b);}
  opts.forEach(o=>{const key=typeof o==='object'?o.v:o;const lbl=getText?getText(o):(typeof o==='object'?o.t:o);const el=document.createElement('option');el.value=key;el.textContent=lbl;if(key===val)el.selected=true;s.appendChild(el);});

function buildFitCard(f,idx){

    f.shape=v;

          port.gender=sp.genders?sp.genders[0]:null;

          }else{

          }
        }
        if(!port.size)port.size=sp.sizes[0];

        szSel.style.cssText='flex:1 1 auto;min-width:72px';pf.appendChild(szSel);
      }
      pg.appendChild(pf);card.appendChild(pg);

    const qtyRow=document.createElement('div');qtyRow.style.cssText='display:flex;align-items:center;gap:6px;margin-top:2px';

    const qi=document.createElement('input');qi.type='number';qi.min='1';qi.value=f.qty||1;qi.className='inp-b';qi.style.cssText='width:68px;padding:6px 8px;font-size:14px';
    qi.addEventListener('input',e=>{f.qty=Math.max(1,parseInt(e.target.value)||1);});
    qtyRow.appendChild(ql);qtyRow.appendChild(qi);card.appendChild(qtyRow);

function getSizeForBore(specKey,bore){
  if(!bore)return null;

  if(specKey==='Steel_Tube_Fitting'){return sp.sizes.find(s=>BORE_MAP.ST[s]===bore)||null;}
  const c=bore+'"';if(sp.sizes.includes(c))return c;
  if(sp.sizes.includes(bore))return bore;

}

function fillForm(r){

// ── 表格 ──────────────────────────────────────────────────────────
function sortedRecs(){
  if(!sortCol)return[...records];
  return[...records].sort((a,b)=>{
    let av,bv;
    if(sortCol==='a'){av=buildLabel(a.a);bv=buildLabel(b.a);}else if(sortCol==='b'){av=buildLabel(a.b);bv=buildLabel(b.b);}
    else if(sortCol==='len'){av=a.len;bv=b.len;}else if(sortCol==='bore'){av=a.bore||'';bv=b.bore||'';}
    else if(sortCol==='layers'){av=a.layers||0;bv=b.layers||0;}else if(sortCol==='pressure'){av=a.pressure||0;bv=b.pressure||0;}
    else if(sortCol==='qty'){av=a.qty;bv=b.qty;}else if(sortCol==='note'){av=a.note||'';bv=b.note||'';}
    else{av=a.vendor||'';bv=b.vendor||'';}
    return(av<bv?-1:av>bv?1:0)*(sortDir==='asc'?1:-1);
  });
}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function mkTd(html,cls,style){const td=document.createElement('td');if(cls)td.className=cls;if(style)td.style.cssText=style;td.innerHTML=html;return td;}

    {h:'長度(mm)',f:r=>r.len},{h:'管徑',f:r=>esc(r.bore||'—')},{h:'層數',f:r=>r.layers?r.layers+'層':'—'},
    {h:'耐壓(BAR)',f:r=>r.pressure||'—'},{h:'數量',f:r=>r.qty||1}];
  if(inclFit)cols.push({h:'使用接頭',f:r=>(r.fittings&&r.fittings.length)?r.fittings.map(x=>esc(fittingLabel(x))).join('<br>'):'—'});
  if(inclNote)cols.push({h:'位置/功用/備註',f:r=>esc(r.note||'—')});
  cols.push({h:'說明(給廠商)',f:r=>esc(r.vendor||'—')});
  let h='<table><thead><tr>'+cols.map(c=>`<th>${c.h}</th>`).join('')+'</tr></thead><tbody>';
  recs.forEach((r,i)=>{h+='<tr>'+cols.map(c=>`<td>${c.f(r,i)}</td>`).join('')+'</tr>';});
  return h+'</tbody></table>';
}
function buildFitTbl(recs){
  let h='<table><thead><tr><th>規格</th><th>數量</th></tr></thead><tbody>';
  let any=false;
  recs.forEach((r,i)=>{
    (r.fittings||[]).filter(f=>f.shape).forEach(f=>{
      any=true;
      h+=`<tr><td>${esc(fittingLabel(f))}</td><td style="text-align:center">${f.qty}</td></tr>`;
    });
  });
  if(!any)h+='<tr><td colspan="2" style="text-align:center;color:#888">無接頭資料</td></tr>';
  return h+'</tbody></table>';
}
function genPDF(mode){
  if(!records.length){showToast('清單為空，無法產生 PDF');return;}
  const recs=sortedRecs();
  const d=new Date();const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const total=recs.reduce((s,r)=>s+(r.qty||1),0);
  let html=`<h1>軟管清單${mode==='vendor'?'（給廠商）':''}</h1><div class="meta">製表日期：${ds}　筆數：${recs.length}　軟管總數：${total} 條</div>`;
  if(mode==='full'){html+=buildMainTbl(recs,true,true);}
  else{html+=buildMainTbl(recs,false,false);html+='<h2>接頭需求量</h2>';html+=buildFitTbl(recs);}
  document.getElementById('print-area').innerHTML=html;
  window.print();
}
document.getElementById('btn-pdf').addEventListener('click',()=>genPDF('full'));
document.getElementById('btn-vendor').addEventListener('click',()=>genPDF('vendor'));

renderTable();
</script>
</body>
</html>
