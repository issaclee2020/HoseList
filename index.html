<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>軟管丈量記錄</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<style>
:root{
  --font-sans:system-ui,-apple-system,sans-serif;
  --font-mono:'Menlo','Consolas',monospace;
  --color-text-primary:#1a1410;
  --color-text-secondary:#4a4540;
  --color-text-tertiary:#7a746e;
  --color-text-info:#1a5c8a;
  --color-text-danger:#b91c1c;
  --color-background-primary:#fdf8f2;
  --color-background-secondary:#f0e8de;
  --color-background-info:#dceefb;
  --color-border-tertiary:rgba(30,20,10,0.18);
  --color-border-secondary:rgba(30,20,10,0.35);
  --border-radius-md:8px;
  --border-radius-lg:12px;
  --page-bg:#e8e0d6;
}
@media(prefers-color-scheme:dark){
  :root{
    --color-text-primary:#f5f0e8;
    --color-text-secondary:#c0b8ae;
    --color-text-tertiary:#857e76;
    --color-text-info:#7dc4f0;
    --color-text-danger:#f87171;
    --color-background-primary:#2a2520;
    --color-background-secondary:#3a342e;
    --color-background-info:#1a3a52;
    --color-border-tertiary:rgba(245,240,232,0.15);
    --color-border-secondary:rgba(245,240,232,0.3);
    --page-bg:#1c1814;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--page-bg);min-height:100%}
body{font-family:var(--font-sans);font-size:15px;color:var(--color-text-primary)}
select,input{font-family:var(--font-sans);color:var(--color-text-primary);background:var(--color-background-primary);font-size:14px}
/* 長度欄位移除上下箭頭 */
#inp-len::-webkit-inner-spin-button,
#inp-len::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
#inp-len{-moz-appearance:textfield;appearance:textfield}
#app{max-width:680px;margin:0 auto;padding:1rem}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
header h1{font-size:20px;font-weight:600}
header span{font-size:13px;color:var(--color-text-secondary)}
.panel{background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.1rem 1.25rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(30,20,10,0.08)}
.stitle{font-size:12px;font-weight:600;color:var(--color-text-secondary);letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px}
.lbl{font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:5px;display:block}
.preview{font-size:13px;color:var(--color-text-tertiary);margin-top:6px;font-family:var(--font-mono);min-height:18px;word-break:break-all}
.conn-row{display:flex;gap:6px;flex-wrap:wrap}
.ssel{padding:7px 8px;border-radius:var(--border-radius-md);border:1.5px solid var(--color-border-secondary);font-size:14px;flex:1 1 auto;min-width:76px;max-width:100%;background:var(--color-background-primary);color:var(--color-text-primary)}
.ssel:focus{outline:2px solid var(--color-text-info);outline-offset:1px}
.inp-b{padding:8px 12px;border-radius:var(--border-radius-md);border:1.5px solid var(--color-border-secondary);font-size:15px;background:var(--color-background-primary);color:var(--color-text-primary);width:100%}
.inp-b:focus{outline:2px solid var(--color-text-info);outline-offset:1px}
.field{margin-bottom:14px}
.field:last-of-type{margin-bottom:0}
.btn{background:transparent;border:1.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:8px 16px;font-size:14px;cursor:pointer;color:var(--color-text-primary);display:inline-flex;align-items:center;gap:7px;font-family:var(--font-sans);white-space:nowrap;font-weight:500}
.btn:hover{background:var(--color-background-secondary)}
.btn:active{transform:scale(.98)}
.btn.pri{background:#1a4a6e;color:#ffffff;border-color:#1a4a6e}
.btn.pri:hover{background:#15405f;border-color:#15405f}
.btn.sm{padding:6px 12px;font-size:13px;font-weight:500}
/* 操作按鈕明確配色 */
.btn-copy-row{background:transparent;border:1.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:6px 13px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font-sans);color:var(--color-text-secondary);display:inline-flex;align-items:center;gap:5px}
.btn-copy-row:hover{background:#e8f4fd;border-color:#1a5c8a;color:#1a5c8a}
.btn-edit-row{background:transparent;border:1.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:6px 13px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font-sans);color:var(--color-text-secondary);display:inline-flex;align-items:center;gap:5px}
.btn-edit-row:hover{background:#fff7e6;border-color:#b45309;color:#b45309}
.btn-del-row{background:transparent;border:1.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:6px 13px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font-sans);color:var(--color-text-secondary);display:inline-flex;align-items:center;gap:5px}
.btn-del-row:hover{background:#fef2f2;border-color:#b91c1c;color:#b91c1c}
.act-btns{display:flex;gap:8px;flex-wrap:nowrap}
.add-inp-row{display:none;gap:4px;margin-top:6px;align-items:center}
.add-inp-row input{flex:1;padding:6px 10px;border-radius:var(--border-radius-md);border:1.5px solid var(--color-border-secondary);font-size:13px;min-width:0;background:var(--color-background-primary);color:var(--color-text-primary)}
.sel-wrap{display:flex;flex-direction:column;flex:1 1 auto;min-width:76px}
.form-btns{display:flex;gap:8px;margin-top:16px}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:14px;min-width:600px}
th{font-size:12px;font-weight:600;color:var(--color-text-secondary);text-align:left;padding:9px 12px;border-bottom:1.5px solid var(--color-border-secondary);white-space:nowrap;cursor:pointer;user-select:none;background:var(--color-background-secondary)}
th.r{text-align:right}th:hover{color:var(--color-text-primary)}
td{padding:10px 12px;border-bottom:1px solid var(--color-border-tertiary);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--color-background-secondary)}
tr.hl td{background:var(--color-background-info)!important}
.mono{font-family:var(--font-mono);font-size:13px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--color-text-info);font-weight:500}
.num{text-align:right;font-family:var(--font-mono);font-weight:600;font-size:15px;white-space:nowrap}
.qty-cell{text-align:center;font-family:var(--font-mono);font-weight:600}
.stat-bar{display:flex;align-items:center;gap:12px;margin-top:14px;flex-wrap:wrap;font-size:13px;color:var(--color-text-secondary)}
.stat-bar b{color:var(--color-text-primary);font-weight:600}
.vsep{width:1.5px;height:16px;background:var(--color-border-tertiary)}
.export-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.empty{text-align:center;padding:2.5rem;color:var(--color-text-tertiary);font-size:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a4a6e;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:500;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">

<header>
  <h1>軟管丈量記錄</h1>
  <span id="hdr-count"></span>
</header>

<div class="panel" id="form-panel">
  <div class="stitle" id="form-title">新增紀錄</div>

  <div class="field">
    <span class="lbl">端 A</span>
    <div id="mntA"></div>
    <div class="preview">→ <span style="color:var(--color-text-info)" id="pvA"></span></div>
  </div>

  <div class="field">
    <span class="lbl">長度 (mm)</span>
    <input type="number" id="inp-len" inputmode="numeric" class="inp-b" style="width:140px" autocomplete="off">
  </div>

  <div class="field">
    <span class="lbl">端 B</span>
    <div id="mntB"></div>
    <div class="preview">→ <span style="color:var(--color-text-info)" id="pvB"></span></div>
  </div>

  <div class="field">
    <span class="lbl">數量</span>
    <input type="number" id="inp-qty" min="1" value="1" class="inp-b" style="width:100px">
  </div>

  <div class="field">
    <span class="lbl">位置 / 功用</span>
    <input type="text" id="inp-note" class="inp-b" autocomplete="off">
  </div>

  <div class="field">
    <span class="lbl">備註</span>
    <input type="text" id="inp-remark" class="inp-b" autocomplete="off">
  </div>

  <div class="form-btns">
    <button class="btn pri" id="btn-sub"><i class="ti ti-plus" id="ico-sub"></i><span id="lbl-sub">新增</span></button>
    <button class="btn" id="btn-cancel" style="display:none"><i class="ti ti-x"></i> 取消</button>
  </div>
</div>

<div class="panel" id="tbl-panel" style="display:none">
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th style="width:32px">#</th>
        <th data-col="a">端 A<span id="si-a" style="font-size:9px;margin-left:3px"></span></th>
        <th data-col="len" class="r" style="width:80px">長度<span id="si-len" style="font-size:9px;margin-left:3px"></span></th>
        <th data-col="b">端 B<span id="si-b" style="font-size:9px;margin-left:3px"></span></th>
        <th data-col="qty" class="r" style="width:58px">數量<span id="si-qty" style="font-size:9px;margin-left:3px"></span></th>
        <th data-col="note">位置/功用<span id="si-note" style="font-size:9px;margin-left:3px"></span></th>
        <th data-col="remark">備註<span id="si-remark" style="font-size:9px;margin-left:3px"></span></th>
        <th style="width:1px"></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="stat-bar">
    筆數 <b id="sc">0</b>
    <div class="vsep"></div>
    軟管總數 <b id="sq">0</b> 條
  </div>

  <div class="export-row">
    <button class="btn" id="btn-exp"><i class="ti ti-download"></i> 匯出 .txt</button>
    <button class="btn" id="btn-clip"><i class="ti ti-clipboard-copy"></i> 複製到剪貼簿</button>
  </div>
</div>

<div id="empty-msg" class="empty">
  <i class="ti ti-clipboard-list" style="font-size:28px;display:block;margin-bottom:8px"></i>
  尚無紀錄，填寫上方表單後新增
</div>

<div id="toast" class="toast"></div>

</div>
<script>
const TH_SZ=['1/8"','1/4"','3/8"','1/2"','3/4"','1"','1 1/4"','1 1/2"'];
const ST_SZ=['8S','10S','12S','16S','20S'];
const BASE_TYPES=['母直頭','母90度頭','公直頭','公90度頭'];
const custom={THSz:[],STSz:[],types:[]};
const isDirect=t=>t.endsWith('直頭');

function buildLabel(s){
  const p=s.cat==='TH'?'TH'+s.sz:s.sz;
  if(isDirect(s.type))return p+s.type;
  return p+s.type+(s.dir==='反向'?'(反向)':'');
}

const csA={cat:'TH',sz:'1/4"',type:'母直頭',dir:'順向'};
const csB={cat:'TH',sz:'1/4"',type:'母直頭',dir:'順向'};

function updPv(cs,pvId){document.getElementById(pvId).textContent=buildLabel(cs);}
function hasOpt(sel,val){for(const o of sel.options)if(o.value===val)return true;return false;}
function addOptToSel(sel,val){
  if(hasOpt(sel,val))return;
  const a=sel.querySelector('option[value="__ADD__"]');
  const o=document.createElement('option');o.value=val;o.textContent=val;
  if(a)sel.insertBefore(o,a);else sel.appendChild(o);
}

function mkSelWrap(opts,customArr,val,onchange,catKey){
  const wrap=document.createElement('div');wrap.className='sel-wrap';
  const sel=document.createElement('select');sel.className='ssel';
  if(catKey)sel.dataset.cat=catKey;
  [...opts,...customArr].forEach(o=>{
    const opt=document.createElement('option');opt.value=o;opt.textContent=o;
    if(o===val)opt.selected=true;sel.appendChild(opt);
  });
  const addOpt=document.createElement('option');addOpt.value='__ADD__';addOpt.textContent='＋ 新增項目…';
  sel.appendChild(addOpt);
  const aRow=document.createElement('div');aRow.className='add-inp-row';
  const aInp=document.createElement('input');aInp.type='text';aInp.placeholder='輸入後按 Enter 確認';
  const xBtn=document.createElement('button');xBtn.className='btn sm';xBtn.type='button';
  xBtn.innerHTML='<i class="ti ti-x"></i>';
  aRow.appendChild(aInp);aRow.appendChild(xBtn);
  let prev=val;
  sel.addEventListener('change',e=>{
    if(e.target.value==='__ADD__'){sel.value=prev;aRow.style.display='flex';aInp.focus();}
    else{prev=e.target.value;aRow.style.display='none';onchange(e.target.value);}
  });
  const confirm=()=>{
    const v=aInp.value.trim();if(!v)return;
    customArr.push(v);
    if(catKey)document.querySelectorAll(`select[data-cat="${catKey}"]`).forEach(s=>addOptToSel(s,v));
    else addOptToSel(sel,v);
    sel.value=v;prev=v;aRow.style.display='none';aInp.value='';onchange(v);
  };
  aInp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();confirm();}
    if(e.key==='Escape'){aRow.style.display='none';aInp.value='';sel.value=prev;}
  });
  xBtn.addEventListener('click',()=>{aRow.style.display='none';aInp.value='';sel.value=prev;});
  wrap.appendChild(sel);wrap.appendChild(aRow);
  return{wrap,sel};
}

function buildConn(mountId,cs,pvId){
  const mnt=document.getElementById(mountId);mnt.innerHTML='';
  const row=document.createElement('div');row.className='conn-row';
  const catSel=document.createElement('select');catSel.className='ssel';
  ['TH','鋼管頭'].forEach(v=>{
    const o=document.createElement('option');o.value=v;o.textContent=v;
    if(v===cs.cat)o.selected=true;catSel.appendChild(o);
  });
  const szKey=cs.cat==='TH'?'THSz':'STSz';
  const szCustom=cs.cat==='TH'?custom.THSz:custom.STSz;
  const szCtrl=mkSelWrap(cs.cat==='TH'?TH_SZ:ST_SZ,szCustom,cs.sz,v=>{cs.sz=v;updPv(cs,pvId);},szKey);
  const typeCtrl=mkSelWrap(BASE_TYPES,custom.types,cs.type,v=>{
    cs.type=v;dirWrap.style.display=isDirect(v)?'none':'block';
    if(isDirect(v))cs.dir='順向';updPv(cs,pvId);
  },'type');
  const dirWrap=document.createElement('div');
  dirWrap.style.cssText='flex:1 1 auto;min-width:76px;display:'+(isDirect(cs.type)?'none':'block');
  const dirSel=document.createElement('select');dirSel.className='ssel';
  ['順向','反向'].forEach(v=>{
    const o=document.createElement('option');o.value=v;o.textContent=v;
    if(v===cs.dir)o.selected=true;dirSel.appendChild(o);
  });
  dirSel.addEventListener('change',e=>{cs.dir=e.target.value;updPv(cs,pvId);});
  dirWrap.appendChild(dirSel);
  catSel.addEventListener('change',e=>{
    cs.cat=e.target.value;cs.sz=cs.cat==='TH'?TH_SZ[1]:ST_SZ[1];
    buildConn(mountId,cs,pvId);
  });
  row.appendChild(catSel);row.appendChild(szCtrl.wrap);row.appendChild(typeCtrl.wrap);row.appendChild(dirWrap);
  mnt.appendChild(row);updPv(cs,pvId);
}

buildConn('mntA',csA,'pvA');
buildConn('mntB',csB,'pvB');

let records=[],nextId=1,sortCol=null,sortDir='asc',editId=null;

function sortedRecs(){
  if(!sortCol)return[...records];
  return[...records].sort((a,b)=>{
    let av,bv;
    if(sortCol==='a'){av=buildLabel(a.a);bv=buildLabel(b.a);}
    else if(sortCol==='b'){av=buildLabel(a.b);bv=buildLabel(b.b);}
    else if(sortCol==='len'){av=a.len;bv=b.len;}
    else if(sortCol==='qty'){av=a.qty;bv=b.qty;}
    else if(sortCol==='note'){av=a.note||'';bv=b.note||'';}
    else{av=a.remark||'';bv=b.remark||'';}
    return(av<bv?-1:av>bv?1:0)*(sortDir==='asc'?1:-1);
  });
}

function setEditMode(on,id){
  editId=on?id:null;
  document.getElementById('form-title').textContent=on?'編輯紀錄':'新增紀錄';
  document.getElementById('ico-sub').className=on?'ti ti-check':'ti ti-plus';
  document.getElementById('lbl-sub').textContent=on?'儲存':'新增';
  document.getElementById('btn-cancel').style.display=on?'inline-flex':'none';
}

function fillForm(r){
  Object.assign(csA,r.a);Object.assign(csB,r.b);
  buildConn('mntA',csA,'pvA');buildConn('mntB',csB,'pvB');
  document.getElementById('inp-len').value=r.len;
  document.getElementById('inp-qty').value=r.qty||1;
  document.getElementById('inp-note').value=r.note||'';
  document.getElementById('inp-remark').value=r.remark||'';
}

function resetForm(){
  Object.assign(csA,{cat:'TH',sz:'1/4"',type:'母直頭',dir:'順向'});
  Object.assign(csB,{cat:'TH',sz:'1/4"',type:'母直頭',dir:'順向'});
  buildConn('mntA',csA,'pvA');buildConn('mntB',csB,'pvB');
  document.getElementById('inp-len').value='';
  document.getElementById('inp-qty').value=1;
  document.getElementById('inp-note').value='';
  document.getElementById('inp-remark').value='';
}

document.getElementById('btn-sub').addEventListener('click',()=>{
  const len=parseInt(document.getElementById('inp-len').value);
  if(!len||len<=0){document.getElementById('inp-len').focus();return;}
  const qty=Math.max(1,parseInt(document.getElementById('inp-qty').value)||1);
  const note=document.getElementById('inp-note').value.trim();
  const remark=document.getElementById('inp-remark').value.trim();
  if(editId!==null){
    const r=records.find(x=>x.id===editId);
    if(r){r.a={...csA};r.b={...csB};r.len=len;r.qty=qty;r.note=note;r.remark=remark;}
    setEditMode(false);
  } else {
    records.push({id:nextId++,a:{...csA},b:{...csB},len,qty,note,remark});
  }
  resetForm();renderTable();
});

document.getElementById('btn-cancel').addEventListener('click',()=>{setEditMode(false);resetForm();renderTable();});
['inp-len','inp-qty','inp-note','inp-remark'].forEach(id=>{
  document.getElementById(id).addEventListener('keydown',e=>{
    if(e.key==='Enter')document.getElementById('btn-sub').click();
  });
});

function formatLines(recs){
  return recs.map(r=>{
    const la=buildLabel(r.a),lb=buildLabel(r.b);
    const qty=r.qty&&r.qty>1?'×'+r.qty:'';
    const parts=[la+'＊'+lb+'＊'+r.len+'mm'+qty];
    if(r.note)parts.push(r.note);
    if(r.remark)parts.push('['+r.remark+']');
    return parts.join(' ');
  }).join('\n');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

document.getElementById('btn-exp').addEventListener('click',()=>{
  const d=new Date();
  const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const txt='軟管清單 '+ds+'\n'+'─'.repeat(40)+'\n'+formatLines(sortedRecs());
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='軟管清單_'+ds+'.txt';a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('btn-clip').addEventListener('click',async()=>{
  const txt=formatLines(sortedRecs());
  try{
    await navigator.clipboard.writeText(txt);
    showToast('✓ 已複製到剪貼簿');
  }catch(e){
    const ta=document.createElement('textarea');ta.value=txt;
    ta.style.cssText='position:fixed;top:-9999px;left:-9999px';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✓ 已複製到剪貼簿');
  }
});

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderTable(){
  const panel=document.getElementById('tbl-panel');
  const empty=document.getElementById('empty-msg');
  const hdr=document.getElementById('hdr-count');
  if(!records.length){panel.style.display='none';empty.style.display='block';hdr.textContent='';return;}
  panel.style.display='block';empty.style.display='none';
  hdr.textContent='共 '+records.length+' 筆';
  ['a','b','len','qty','note','remark'].forEach(c=>{
    const el=document.getElementById('si-'+c);
    if(el)el.textContent=sortCol===c?(sortDir==='asc'?' ↑':' ↓'):'';
  });
  const tbody=document.getElementById('tbody');tbody.innerHTML='';
  sortedRecs().forEach((r,i)=>{
    const tr=document.createElement('tr');if(editId===r.id)tr.className='hl';
    const la=buildLabel(r.a),lb=buildLabel(r.b);
    const qty=r.qty||1;
    tr.innerHTML=`
      <td style="color:var(--color-text-tertiary);font-size:12px;width:32px">${i+1}</td>
      <td class="mono" title="${esc(la)}">${esc(la)}</td>
      <td class="num">${r.len}<span style="font-size:11px;color:var(--color-text-tertiary);margin-left:2px">mm</span></td>
      <td class="mono" title="${esc(lb)}">${esc(lb)}</td>
      <td class="qty-cell">${qty}</td>
      <td style="font-size:13px;color:var(--color-text-secondary);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(r.note||'')}">${r.note?esc(r.note):'<span style="color:var(--color-text-tertiary)">—</span>'}</td>
      <td style="font-size:13px;color:var(--color-text-tertiary);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(r.remark||'')}">${r.remark?esc(r.remark):'<span style="color:var(--color-text-tertiary)">—</span>'}</td>
      <td>
        <div class="act-btns">
          <button class="btn-copy-row cp-btn" data-id="${r.id}" title="複製此筆"><i class="ti ti-copy"></i> 複製</button>
          <button class="btn-edit-row ed-btn" data-id="${r.id}" title="編輯此筆"><i class="ti ti-pencil"></i> 編輯</button>
          <button class="btn-del-row dl-btn" data-id="${r.id}" title="刪除此筆"><i class="ti ti-trash"></i> 刪除</button>
        </div>
      </td>`;
    tbody.appendChild(tr);
  });
  tbody.querySelectorAll('.cp-btn').forEach(b=>b.addEventListener('click',()=>{
    const r=records.find(x=>x.id===parseInt(b.dataset.id));if(!r)return;
    const nr={id:nextId++,a:{...r.a},b:{...r.b},len:r.len,qty:r.qty||1,
              note:r.note,remark:r.remark?r.remark+' (複製)':'(複製)'};
    records.splice(records.findIndex(x=>x.id===r.id)+1,0,nr);
    fillForm(nr);setEditMode(true,nr.id);renderTable();
    window.scrollTo({top:0,behavior:'smooth'});
  }));
  tbody.querySelectorAll('.ed-btn').forEach(b=>b.addEventListener('click',()=>{
    const r=records.find(x=>x.id===parseInt(b.dataset.id));if(!r)return;
    fillForm(r);setEditMode(true,r.id);renderTable();
    window.scrollTo({top:0,behavior:'smooth'});
  }));
  tbody.querySelectorAll('.dl-btn').forEach(b=>b.addEventListener('click',()=>{
    const id=parseInt(b.dataset.id);
    if(editId===id){setEditMode(false);resetForm();}
    records=records.filter(x=>x.id!==id);renderTable();
  }));
  document.getElementById('sc').textContent=records.length;
  document.getElementById('sq').textContent=records.reduce((s,r)=>s+(r.qty||1),0);
}

document.querySelectorAll('th[data-col]').forEach(th=>th.addEventListener('click',()=>{
  const c=th.dataset.col;
  sortDir=sortCol===c?(sortDir==='asc'?'desc':'asc'):'asc';
  sortCol=c;renderTable();
}));

renderTable();
</script>
</body>
</html>
